spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aicontentgenerator
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    # Generate a strong secret: openssl rand -base64 64
    secret: ${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yYWljb250ZW50Z2VuZXJhdG9yMTIzNDU2Nzg=}
    expiration: 900000            # 15 minutes (ms)
    refresh-expiration: 604800000 # 7 days (ms)

  ai:
    # 'mock' requires no API key — switch to 'openai' for real generation
    provider: ${AI_PROVIDER:mock}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com/v1
      model: gpt-4o-mini
      max-tokens: 1000
      system-prompt: "You are a professional content writer. Generate clear, engaging, and well-structured content based on the user's prompt."

  rate-limit:
    auth:
      capacity: 10        # max burst
      refill-tokens: 10   # tokens restored per period
      refill-period: 1m   # 10 requests per minute
    ai:
      capacity: 20        # max burst
      refill-tokens: 20   # tokens restored per period
      refill-period: 1h   # 20 requests per hour (AI calls are expensive)
    general:
      capacity: 100       # max burst
      refill-tokens: 100  # tokens restored per period
      refill-period: 1m   # 100 requests per minute

logging:
  level:
    com.aicontentgenerator: DEBUG
    org.springframework.security: INFO