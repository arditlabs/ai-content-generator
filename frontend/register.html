<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account · AiContentGenerator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-logo">A</div>
        <div class="brand-name">AiContentGenerator</div>
      </div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Start generating AI content in seconds.</p>
      <div id="alert" class="alert"></div>
      <form id="register-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="janedoe" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="At least 6 characters" autocomplete="new-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Create account</button>
      </form>
      <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>
  <script src="app.js"></script>
  <script>AiApp.initRegisterPage();</script>
</body>
</html>
